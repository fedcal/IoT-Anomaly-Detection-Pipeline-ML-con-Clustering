name: Deploy MkDocs documentation

# Builda il sito MkDocs e lo pubblica su GitHub Pages a ogni push su main.
# Setup richiesto una sola volta: Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:        # consente trigger manuale dalla UI di GitHub

# Permessi minimi per il deploy su GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Una sola deploy alla volta; cancella eventuali in coda.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build MkDocs site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # serve per `mkdocs-material` git revision date plugin (futuro)

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install MkDocs Material + extensions
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs>=1.6 mkdocs-material>=9.5 pymdown-extensions>=10.7

      - name: Build static site
        run: mkdocs build --strict --site-dir ./site

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
