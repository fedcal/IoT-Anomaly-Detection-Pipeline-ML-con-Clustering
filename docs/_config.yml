# ===================================================================
# Jekyll + Just the Docs — IoT Anomaly Detection Pipeline
# Tema mobile-first, sidebar gerarchica, search built-in, dark mode,
# MathJax per formule, code copy. SEO-ready (sitemap + seo-tag).
# ===================================================================

title: IoT Anomaly Detection — ML Pipeline
description: >-
  Pipeline ML end-to-end per anomaly detection IoT con clustering KMeans/GMM,
  feature engineering temporale (rolling/diff/zscore), time-aware split senza
  leakage, soglia ottimale percentile, validazione vs ground-truth parziale.

# URL canonico del sito (importante per SEO + sitemap)
url: https://fedcal.github.io
baseurl: /iot-anomaly-detection-clustering

# --- Tema (gem locale — build via GitHub Actions con Bundler) ---
theme: just-the-docs
color_scheme: light

# --- Permalink puliti senza .html ---
permalink: pretty

# --- Lingua ---
lang: it-IT

# --- Plugins ---
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache

# --- Configurazione tema Just the Docs ---

# Search lunr (sidebar)
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

# Toggle dark/light (in alto a destra)
color_scheme_toggle: true

# Anchor copy + back-to-top + copy code
heading_anchors: true
back_to_top: true
back_to_top_text: "↑ Torna su"
enable_copy_code_button: true

# MathJax per formule LaTeX
mathjax: true

# Aux links in alto (GitHub repo, sito personale)
aux_links:
  "GitHub":
    - "https://github.com/fedcal/iot-anomaly-detection-clustering"
  "federicocalo.dev":
    - "https://federicocalo.dev"
aux_links_new_tab: true

# "Edit this page" link
gh_edit_link: true
gh_edit_link_text: "Modifica questa pagina su GitHub"
gh_edit_repository: "https://github.com/fedcal/iot-anomaly-detection-clustering"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "tree"

# Callouts personalizzati (aggiunge .note, .warning, .tip)
callouts_level: quiet
callouts:
  note:
    title: Nota
    color: blue
  warning:
    title: Attenzione
    color: yellow
  tip:
    title: Suggerimento
    color: green
  danger:
    title: Pericolo
    color: red

# --- SEO Tag (jekyll-seo-tag) ---
author:
  name: Federico Calò
  url: https://federicocalo.dev
twitter:
  card: summary_large_image
social:
  name: Federico Calò
  links:
    - https://github.com/fedcal
    - https://www.linkedin.com/in/federicocalo/
    - https://federicocalo.dev

# --- File esclusi dal build ---
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/
  - "*.iml"
  - .idea/
  - README-jekyll.md
